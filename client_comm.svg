<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#fce4ec"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9ff"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0567a"/>
      <stop offset="100%" stop-color="#e07999"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3cbfb4"/>
      <stop offset="100%" stop-color="#5dd6cb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="720" cy="80" r="120" fill="#c0567a" opacity="0.07"/>
  <circle cx="80" cy="420" r="100" fill="#3cbfb4" opacity="0.08"/>
  <circle cx="400" cy="250" r="300" fill="white" opacity="0.15"/>

  <!-- Main chat card -->
  <rect x="60" y="60" width="430" height="380" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Chat header -->
  <rect x="60" y="60" width="430" height="64" rx="20" fill="url(#rose)"/>
  <rect x="60" y="100" width="430" height="24" fill="url(#rose)"/>
  <!-- Avatar in header -->
  <circle cx="102" cy="92" r="20" fill="white" opacity="0.3"/>
  <circle cx="102" cy="92" r="16" fill="white" opacity="0.5"/>
  <!-- Initials -->
  <text x="102" y="97" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#c0567a">RS</text>
  <!-- Header text -->
  <text x="132" y="87" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white">Ranjani S.</text>
  <text x="132" y="103" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">● Online · Digital Marketing Executive</text>

  <!-- Message bubbles - client -->
  <rect x="88" y="144" width="200" height="44" rx="14" fill="#f3f4f6" filter="url(#shadow-sm)"/>
  <text x="104" y="162" font-family="Arial, sans-serif" font-size="11" fill="#374151">Hi Ranjani! Can we get a</text>
  <text x="104" y="177" font-family="Arial, sans-serif" font-size="11" fill="#374151">monthly performance report?</text>
  <text x="296" y="188" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#9ca3af">10:02 AM</text>

  <!-- Message bubbles - Ranjani -->
  <rect x="164" y="204" width="290" height="56" rx="14" fill="url(#rose)" filter="url(#shadow-sm)"/>
  <text x="180" y="222" font-family="Arial, sans-serif" font-size="11" fill="white">Of course! I'll send over the full</text>
  <text x="180" y="237" font-family="Arial, sans-serif" font-size="11" fill="white">analytics breakdown — Google Ads</text>
  <text x="180" y="252" font-family="Arial, sans-serif" font-size="11" fill="white">ROI, Meta reach &amp; lead summary.</text>
  <text x="448" y="262" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">10:04 AM ✓✓</text>

  <!-- Client reply -->
  <rect x="88" y="276" width="216" height="30" rx="14" fill="#f3f4f6" filter="url(#shadow-sm)"/>
  <text x="104" y="295" font-family="Arial, sans-serif" font-size="11" fill="#374151">That's perfect, thank you! 🙏</text>
  <text x="310" y="307" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#9ca3af">10:06 AM</text>

  <!-- Report attachment -->
  <rect x="164" y="320" width="258" height="52" rx="12" fill="#fff7f9" stroke="#f9c6d3" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <rect x="176" y="330" width="36" height="36" rx="8" fill="#fce4ec"/>
  <text x="194" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#c0567a">📊</text>
  <text x="220" y="343" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1f2937">Monthly Report — May 2025</text>
  <text x="220" y="358" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">PDF · 2.4 MB · Sent via email</text>
  <text x="416" y="373" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="rgba(192,86,122,0.7)">10:08 AM ✓✓</text>

  <!-- Input bar -->
  <rect x="76" y="388" width="398" height="36" rx="18" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="100" y="411" font-family="Arial, sans-serif" font-size="11" fill="#d1d5db">Type a message...</text>
  <circle cx="456" cy="406" r="13" fill="url(#rose)"/>
  <text x="456" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white">➤</text>

  <!-- Stats cards on right -->
  <!-- Card 1 -->
  <rect x="520" y="60" width="220" height="100" rx="16" fill="white" filter="url(#shadow)"/>
  <rect x="536" y="76" width="36" height="36" rx="10" fill="#fce4ec"/>
  <text x="554" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🤝</text>
  <text x="584" y="90" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Clients Managed</text>
  <text x="584" y="112" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#c0567a">12+</text>
  <text x="536" y="148" font-family="Arial, sans-serif" font-size="10" fill="#10b981">↑ 100% satisfaction rate</text>

  <!-- Card 2 -->
  <rect x="520" y="176" width="220" height="100" rx="16" fill="white" filter="url(#shadow)"/>
  <rect x="536" y="192" width="36" height="36" rx="10" fill="#e6faf9"/>
  <text x="554" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">📈</text>
  <text x="584" y="206" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Reports Delivered</text>
  <text x="584" y="228" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#3cbfb4">50+</text>
  <text x="536" y="264" font-family="Arial, sans-serif" font-size="10" fill="#10b981">↑ On-time every month</text>

  <!-- Card 3 - channels -->
  <rect x="520" y="292" width="220" height="148" rx="16" fill="white" filter="url(#shadow)"/>
  <text x="540" y="318" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1f2937">Communication Channels</text>
  <!-- Channel pills -->
  <rect x="536" y="328" width="70" height="24" rx="12" fill="#fce4ec"/>
  <text x="571" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#c0567a">📧 Email</text>

  <rect x="614" y="328" width="110" height="24" rx="12" fill="#e6faf9"/>
  <text x="669" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#3cbfb4">💬 WhatsApp</text>

  <rect x="536" y="360" width="82" height="24" rx="12" fill="#f3f4f6"/>
  <text x="577" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">📞 Calls</text>

  <rect x="626" y="360" width="98" height="24" rx="12" fill="#fef3c7"/>
  <text x="675" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#d97706">📊 Reports</text>

  <!-- Separator -->
  <line x1="536" y1="398" x2="724" y2="398" stroke="#f3f4f6" stroke-width="1"/>
  <text x="540" y="416" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Onboarding · Follow-ups · Strategy</text>
  <text x="540" y="430" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Calls · Performance Reviews</text>
</svg>
